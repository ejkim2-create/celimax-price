<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CELIMAX · Price Compare</title>
<meta name="description" content="CELIMAX product prices across sellers and channels, with daily history.">
<style>
  :root{ color-scheme:light; --brand:#1f8f4e; --below:#1f8f4e; --above:#d6362c; --bg:#f7f8f7; --ink:#1a1f1a; --muted:#5b665b; --line:#eef0ee; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Pretendard,sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  .wrap{ max-width:1040px; margin:0 auto; padding:20px 16px 48px; }
  .top{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  h1{ font-size:19px; margin:0 0 2px; font-weight:700; }
  h1 .brand{ color:var(--brand); }
  .sub{ color:var(--muted); font-size:12.5px; margin:2px 0 0; }
  .langs{ display:flex; gap:4px; }
  .langs button{ border:1px solid #d7ddd7; background:#fff; color:var(--muted); font-size:12px; padding:5px 10px; border-radius:7px; cursor:pointer; font-weight:600; }
  .langs button.active{ background:var(--brand); color:#fff; border-color:var(--brand); }
  .filters{ display:flex; align-items:center; gap:6px; margin:2px 0 8px; flex-wrap:wrap; }
  .filters button{ border:1px solid #d7ddd7; background:#fff; color:var(--muted); font-size:11.5px; padding:4px 11px; border-radius:14px; cursor:pointer; font-weight:600; }
  .filters button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .fcount{ font-size:11px; color:var(--muted); margin-left:2px; }
  .tabs{ display:flex; gap:6px; margin:14px 0 6px; flex-wrap:wrap; border-bottom:2px solid var(--line); }
  .tabs button{ border:none; background:none; color:var(--muted); font-size:13px; font-weight:700; padding:8px 12px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; }
  .tabs button.active{ color:var(--brand); border-bottom-color:var(--brand); }
  .controls{ display:flex; align-items:center; gap:10px; margin:10px 0 4px; flex-wrap:wrap; }
  .controls label{ font-size:12px; color:var(--muted); font-weight:600; }
  .controls input, .controls select{ font-size:12.5px; padding:5px 8px; border:1px solid #d7ddd7; border-radius:7px; background:#fff; color:var(--ink); }
  .viewing{ font-size:11.5px; color:var(--muted); }
  .viewing.avg{ color:var(--brand); font-weight:700; }
  .viewing.note{ color:var(--above); font-weight:600; }
  .legend{ font-size:11.5px; color:var(--muted); margin:10px 0 10px; line-height:1.5; }
  .legend b.c-blue{ color:#2563eb; } .legend b.c-yellow{ color:#c08a00; } .legend b.c-red{ color:#d6362c; } .legend b.c-dred{ color:#8a1a12; }
  .tablecard{ background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  table{ width:100%; border-collapse:collapse; }
  th,td{ text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:middle; }
  th{ background:#f2f5f2; font-size:11px; color:var(--muted); font-weight:600; }
  th.num,td.num{ text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  tr:last-child td{ border-bottom:none; }
  .name{ font-weight:600; font-size:12px; max-width:320px; }
  .rec{ font-weight:700; }
  .price{ font-weight:700; }
  .price.low{ color:var(--below); }
  a.plink{ text-decoration:none; color:inherit; }
  a.plink:hover .price{ text-decoration:underline; text-underline-offset:2px; }
  .vs{ display:block; font-size:10.5px; font-weight:700; margin-top:1px; }
  .vs.t-blue{ color:#2563eb; } .vs.t-yellow{ color:#c08a00; } .vs.t-red{ color:#d6362c; } .vs.t-dred{ color:#8a1a12; } .vs.t-na{ color:#b9c0b9; font-weight:500; }
  td .na{ color:#c2c8c2; }
  .foot{ color:#8a938a; font-size:11.5px; margin-top:16px; line-height:1.55; }
  .status{ color:#8a938a; font-size:12px; padding:24px 4px; }
  @media (max-width:640px){
    .wrap{ padding:16px 10px 40px; }
    th,td{ padding:8px 7px; } .name{ font-size:11.5px; max-width:none; }
    th{ font-size:10px; } .price{ font-size:12px; } .vs{ font-size:9.5px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1><span class="brand">CELIMAX</span> · <span data-i="title"></span></h1>
      <p class="sub" data-i="subtitle"></p>
    </div>
    <div class="langs" id="langs">
      <button data-lang="ko">한국어</button>
      <button data-lang="en">EN</button>
      <button data-lang="ru">RU</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="controls">
    <label data-i="date_l"></label>
    <input type="date" id="dateInput">
    <label data-i="view_l"></label>
    <select id="timeSel"></select>
    <span class="viewing" id="viewing"></span>
  </div>

  <div class="filters" id="filters"></div>

  <div class="legend" data-i="legend"></div>

  <div class="tablecard">
    <table>
      <thead><tr>
        <th data-i="col_product"></th>
        <th class="num" data-i="col_rec"></th>
        <th class="num">Ozon</th>
        <th class="num">Wildberries</th>
        <th class="num" data-i="col_mall"></th>
      </tr></thead>
      <tbody id="rows"><tr><td colspan="5" class="status" data-i="loading"></td></tr></tbody>
    </table>
  </div>

  <div class="foot" data-i="foot"></div>
</div>

<script>
var I18N = {
  ko:{ title:"판매채널 가격 비교",
    subtitle:"판매자별 · 제안가 대비 Ozon · Wildberries · 공식몰(Подружка) · 통화 ₽",
    legend:'각 칸 아래 %는 <b>제안가 대비 할인율</b>: <b class="c-blue">파랑</b>=제안가 이상, <b class="c-yellow">노랑</b>=~30% 할인, <b class="c-red">빨강</b>=31~50% 할인, <b class="c-dred">진빨강</b>=50% 초과 할인. 굵은 초록가격 = 그 제품의 최저 채널.',
    col_product:"제품", col_rec:"제안가", col_mall:"공식몰",
    f_all:"전체", f_d30:"30%↑ 할인", f_d50:"50%↑ 할인", f_over:"정가보다 비쌈", f_count:"개 표시", f_none:"해당 조건의 제품이 없어요.",
    date_l:"날짜:", view_l:"보기:", avg:"그날 평균",
    avg_tag:"그날 평균", note_nodata:"이 날짜엔 기록이 없어 최신값을 표시합니다.",
    loading:"불러오는 중…", err:"데이터를 불러오지 못했습니다.",
    foot:'최신 기준일 {date} · 4시간마다 자동 갱신·기록. "—"는 미판매/미확인. 날짜를 고르면 그날 평균가, "보기"에서 특정 시각도 볼 수 있어요.' },
  en:{ title:"Channel Price Compare",
    subtitle:"By seller · vs. recommended price · Ozon · Wildberries · Official Mall (Подружка) · ₽",
    legend:'The % is the <b>discount vs. recommended price</b>: <b class="c-blue">blue</b>=at/above rec, <b class="c-yellow">yellow</b>=up to 30% off, <b class="c-red">red</b>=31–50% off, <b class="c-dred">dark red</b>=over 50% off. Bold green price = lowest channel.',
    col_product:"Product", col_rec:"Rec.", col_mall:"Official Mall",
    f_all:"All", f_d30:"30%+ off", f_d50:"50%+ off", f_over:"Above rec.", f_count:" shown", f_none:"No products match.",
    date_l:"Date:", view_l:"View:", avg:"Day average",
    avg_tag:"day average", note_nodata:"No record for this date — showing latest.",
    loading:"Loading…", err:"Failed to load data.",
    foot:'Latest {date} · auto-updated & logged every 4h. "—" = not sold/unconfirmed. Pick a date for the day average; pick a time under "View".' },
  ru:{ title:"Сравнение цен по каналам",
    subtitle:"По продавцам · относит. реком. цены · Ozon · Wildberries · Офиц. магазин (Подружка) · ₽",
    legend:'Процент — <b>скидка от реком. цены</b>: <b class="c-blue">синий</b>=не ниже реком., <b class="c-yellow">жёлтый</b>=до 30%, <b class="c-red">красный</b>=31–50%, <b class="c-dred">тёмно-красный</b>=более 50%. Жирная зелёная цена = мин. канал.',
    col_product:"Товар", col_rec:"Реком.", col_mall:"Офиц. магазин",
    f_all:"Все", f_d30:"скидка 30%+", f_d50:"скидка 50%+", f_over:"дороже реком.", f_count:" показано", f_none:"Нет подходящих товаров.",
    date_l:"Дата:", view_l:"Показ:", avg:"Среднее за день",
    avg_tag:"среднее за день", note_nodata:"Нет записи на эту дату — показано последнее.",
    loading:"Загрузка…", err:"Не удалось загрузить данные.",
    foot:'Последнее {date} · автообновление каждые 4ч. «—» = нет данных. Выберите дату для среднего за день; время — в «Показ».' }
};

var DATA=null, HISTORY=null;
var lang = localStorage.getItem("celimax_lang") || (navigator.language||"ko").slice(0,2);
if(!I18N[lang]) lang="ko";
var sellerId=null, selDate=null, selTime="avg";
var filter="all";

function fmt(n){ return n==null ? "—" : n.toLocaleString("ru-RU")+" ₽"; }

function seller(sid){ for(var i=0;i<DATA.sellers.length;i++){ if(DATA.sellers[i].id===sid) return DATA.sellers[i]; } return DATA.sellers[0]; }
function sellerItems(sid){ return seller(sid).items; }
function sellerName(s){ return s["name_"+lang] || s.name_ko; }
function localName(item){ return item["name_"+lang] || item.name_ko; }

function cell(price, rec, isLow, url){
  if(price==null) return '<td class="num"><span class="na">—</span></td>';
  var vs='<span class="vs t-na">—</span>';
  if(rec){
    var pct=Math.round((1-price/rec)*100);
    var cls, txt;
    if(pct<=0){ cls='t-blue'; txt=(pct===0?'0%':'+'+Math.abs(pct)+'%'); }
    else if(pct<=30){ cls='t-yellow'; txt='−'+pct+'%'; }
    else if(pct<=50){ cls='t-red'; txt='−'+pct+'%'; }
    else { cls='t-dred'; txt='−'+pct+'%'; }
    vs='<span class="vs '+cls+'">'+txt+'</span>';
  }
  var pr='<span class="price'+(isLow?' low':'')+'">'+fmt(price)+'</span>';
  if(url) pr='<a class="plink" href="'+url+'" target="_blank" rel="noopener" title="상품 페이지 열기">'+pr+'</a>';
  return '<td class="num">'+pr+vs+'</td>';
}

function pctOf(v, r){ return (v==null||!r) ? null : Math.round((1-v/r)*100); }
function matchFilter(p){
  if(filter==="all") return true;
  var chans=[p.o,p.w,p.m];
  for(var i=0;i<3;i++){
    var pc=pctOf(chans[i], p.r); if(pc==null) continue;
    if(filter==="d30" && pc>=30) return true;
    if(filter==="d50" && pc>=50) return true;
    if(filter==="over" && pc<0) return true;
  }
  return false;
}
function buildFilters(){
  var box=document.getElementById("filters"); box.innerHTML="";
  var t=I18N[lang];
  [["all",t.f_all],["d30",t.f_d30],["d50",t.f_d50],["over",t.f_over]].forEach(function(o){
    var b=document.createElement("button"); b.textContent=o[1];
    b.className=(filter===o[0]?"active":"");
    b.onclick=function(){ filter=o[0]; render(); };
    box.appendChild(b);
  });
  var c=document.createElement("span"); c.className="fcount"; c.id="fcount"; box.appendChild(c);
}

function daySnaps(date, sid){
  if(!HISTORY||!HISTORY.snapshots) return [];
  return HISTORY.snapshots.filter(function(s){ return s.ts.slice(0,10)===date && s.s && s.s[sid]; });
}
function datesFor(sid){
  var set={}, out=[];
  if(HISTORY&&HISTORY.snapshots) HISTORY.snapshots.forEach(function(s){ if(s.s&&s.s[sid]){ var d=s.ts.slice(0,10); if(!set[d]){set[d]=1;out.push(d);} } });
  out.sort(); return out;
}

function priceRows(){
  var items=sellerItems(sellerId);
  var snaps=daySnaps(selDate, sellerId);
  if(!snaps.length){
    return {note:true, rows:items.map(function(it){ return {r:it.rec,o:it.ozon,w:it.wb,m:it.mall}; })};
  }
  if(selTime!=="avg"){
    var snap=null;
    for(var i=0;i<snaps.length;i++){ if(snaps[i].ts.slice(11)===selTime){ snap=snaps[i]; break; } }
    if(!snap) snap=snaps[snaps.length-1];
    var arr=snap.s[sellerId];
    return {note:false, rows:items.map(function(it,idx){ var r=arr[idx]||{}; return {r:(r.r!=null?r.r:it.rec),o:r.o,w:r.w,m:r.m}; })};
  }
  return {note:false, rows:items.map(function(it,idx){
    var sum={o:0,w:0,m:0}, cnt={o:0,w:0,m:0};
    snaps.forEach(function(sn){ var r=sn.s[sellerId][idx]; if(!r) return;
      ["o","w","m"].forEach(function(ch){ if(r[ch]!=null){ sum[ch]+=r[ch]; cnt[ch]++; } }); });
    return {r:it.rec,
      o:cnt.o?Math.round(sum.o/cnt.o):null,
      w:cnt.w?Math.round(sum.w/cnt.w):null,
      m:cnt.m?Math.round(sum.m/cnt.m):null};
  })};
}

function applyStatic(){
  var t=I18N[lang]; document.documentElement.lang=lang;
  var els=document.querySelectorAll("[data-i]");
  for(var i=0;i<els.length;i++){ var k=els[i].getAttribute("data-i");
    if(k==="foot"){ els[i].innerHTML=t.foot.replace("{date}", DATA?DATA.updated:"—"); continue; }
    if(t[k]!=null) els[i].innerHTML=t[k]; }
  var bs=document.querySelectorAll("#langs button");
  for(var j=0;j<bs.length;j++){ bs[j].classList.toggle("active", bs[j].getAttribute("data-lang")===lang); }
}

function buildTabs(){
  var box=document.getElementById("tabs"); box.innerHTML="";
  DATA.sellers.forEach(function(s){
    var b=document.createElement("button"); b.textContent=sellerName(s);
    b.className=(s.id===sellerId?"active":"");
    b.onclick=function(){ sellerId=s.id; setupDates(); render(); };
    box.appendChild(b);
  });
}

function setupDates(){
  var ds=datesFor(sellerId);
  var di=document.getElementById("dateInput");
  if(ds.length){ di.min=ds[0]; di.max=ds[ds.length-1];
    if(!selDate || ds.indexOf(selDate)<0) selDate=ds[ds.length-1];
  } else { selDate = DATA.updated; }
  di.value=selDate;
  buildTimeSel();
}

function buildTimeSel(){
  var sel=document.getElementById("timeSel"); sel.innerHTML="";
  var o0=document.createElement("option"); o0.value="avg"; o0.textContent=I18N[lang].avg; sel.appendChild(o0);
  var snaps=daySnaps(selDate, sellerId).slice().reverse();
  snaps.forEach(function(s){ var o=document.createElement("option"); var hm=s.ts.slice(11); o.value=hm; o.textContent=hm; sel.appendChild(o); });
  if(selTime!=="avg" && !snaps.some(function(s){return s.ts.slice(11)===selTime;})) selTime="avg";
  sel.value=selTime;
}

function render(){
  applyStatic(); buildTabs(); buildFilters(); buildTimeSel();
  var rows=document.getElementById("rows"); if(!DATA) return;
  var items=sellerItems(sellerId);
  var pr=priceRows();
  var vEl=document.getElementById("viewing");
  if(pr.note){ vEl.className="viewing note"; vEl.textContent=I18N[lang].note_nodata; }
  else if(selTime==="avg"){ vEl.className="viewing avg"; vEl.textContent=selDate+" · "+I18N[lang].avg_tag; }
  else { vEl.className="viewing"; vEl.textContent=selDate+" "+selTime; }

  rows.innerHTML="";
  var shown=0;
  for(var i=0;i<items.length;i++){
    var it=items[i], p=pr.rows[i]||{r:it.rec,o:null,w:null,m:null};
    if(!matchFilter(p)) continue;
    shown++;
    var vals=[p.o,p.w,p.m].filter(function(v){return v!=null;});
    var low=vals.length?Math.min.apply(null,vals):null;
    var oUrl=it.ozon_code?("https://www.ozon.ru/product/"+it.ozon_code+"/"):null;
    var wUrl=it.wb_nm?("https://www.wildberries.ru/catalog/"+it.wb_nm+"/detail.aspx"):null;
    var mUrl=it.mall_url||null;
    var tr=document.createElement("tr");
    tr.innerHTML='<td class="name">'+localName(it)+'</td>'+
      '<td class="num rec">'+fmt(p.r)+'</td>'+
      cell(p.o,p.r,p.o!=null&&p.o===low,oUrl)+
      cell(p.w,p.r,p.w!=null&&p.w===low,wUrl)+
      cell(p.m,p.r,p.m!=null&&p.m===low,mUrl);
    rows.appendChild(tr);
  }
  if(shown===0) rows.innerHTML='<tr><td colspan="5" class="status">'+I18N[lang].f_none+'</td></tr>';
  var fc=document.getElementById("fcount"); if(fc) fc.textContent=shown+I18N[lang].f_count;
}

document.getElementById("langs").addEventListener("click", function(e){
  var b=e.target.closest("button"); if(!b) return;
  lang=b.getAttribute("data-lang"); localStorage.setItem("celimax_lang",lang); render();
});
document.getElementById("dateInput").addEventListener("change", function(e){
  selDate=e.target.value; selTime="avg"; render();
});
document.getElementById("timeSel").addEventListener("change", function(e){
  selTime=e.target.value; render();
});

applyStatic();
Promise.all([
  fetch("data.json?_="+Date.now()).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); }),
  fetch("history.json?_="+Date.now()).then(function(r){ return r.ok?r.json():{snapshots:[]}; }).catch(function(){ return {snapshots:[]}; })
]).then(function(res){
  DATA=res[0]; HISTORY=res[1];
  sellerId=DATA.sellers[0].id;
  setupDates();
  render();
}).catch(function(err){
  document.getElementById("rows").innerHTML='<tr><td colspan="5" class="status">'+I18N[lang].err+'</td></tr>';
  console.error(err);
});
</script>
</body>
</html>
