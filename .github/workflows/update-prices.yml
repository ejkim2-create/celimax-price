name: Update CELIMAX prices

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Update prices
        run: python update_prices.py
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
      - name: Commit changes
        run: |
          git config user.name  "celimax-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json history.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update prices ($(date -u +%F))"
            git pull --rebase --autostash origin main
            git push
          else
            echo "no changes"
          fi
