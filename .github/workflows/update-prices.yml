name: Update CELIMAX prices

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Update prices
        run: python update_prices.py
      - name: Commit updated data.json
        run: |
          git config user.name  "celimax-price-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet data.json; then
            git add data.json
            git commit -m "chore: update prices ($(date -u +%F))"
            git push
          else
            echo "no changes"
          fi
